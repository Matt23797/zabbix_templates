        # --- BGP session discovery ---
        - uuid: 4f4087fa82ed460384769c6d0df8d230
          name: "ROS: BGP session discovery"
          type: DEPENDENT
          key: "ros.bgp.discovery"
          master_item:
            key: "ros.bgp.sessions.raw"
          delay: "300"
          lifetime: "7d"
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                    var arr = JSON.parse(value);
                    return JSON.stringify(arr);
                  } catch(e) {
                    return "[]";
                  }
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - "1h"
          lld_macro_paths:
            - lld_macro: "{#BGP.SESSION}"
              path: "$.name"
            - lld_macro: "{#BGP.REMOTE.AS}"
              path: "$.remote.as"
            - lld_macro: "{#BGP.REMOTE.ADDRESS}"
              path: "$.remote.address"
          item_prototypes:
            - uuid: ff14d69d47c24fa89adbfeae7e40d9c1
              name: "ROS: BGP [{#BGP.SESSION}] established"
              type: DEPENDENT
              key: "ros.bgp.established[{#BGP.SESSION}]"
              master_item:
                key: "ros.bgp.sessions.raw"
              value_type: UNSIGNED
              trends: "7d"
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      try {
                        var arr = JSON.parse(value);
                        for (var i = 0; i < arr.length; i++) {
                          if (arr[i].name === '{#BGP.SESSION}') return 1;
                        }
                        return 0;
                      } catch(e) { return 0; }
              tags:
                - tag: component
                  value: routing
                - tag: scope
                  value: availability

            - uuid: fead0208e6ee4a4a8961bd02b3ecfb7b
              name: "ROS: BGP [{#BGP.SESSION}] prefix count"
              type: DEPENDENT
              key: "ros.bgp.prefix.count[{#BGP.SESSION}]"
              master_item:
                key: "ros.bgp.sessions.raw"
              value_type: UNSIGNED
              trends: "7d"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - "$[?(@.name=='{#BGP.SESSION}')].prefix-count.first()"
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              tags:
                - tag: component
                  value: routing
                - tag: scope
                  value: performance

            - uuid: bbe445c636994c75a09625b571332839
              name: "ROS: BGP [{#BGP.SESSION}] uptime"
              type: DEPENDENT
              key: "ros.bgp.uptime[{#BGP.SESSION}]"
              master_item:
                key: "ros.bgp.sessions.raw"
              value_type: CHAR
              trends: "0"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - "$[?(@.name=='{#BGP.SESSION}')].uptime.first()"
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "down"
              tags:
                - tag: component
                  value: routing
                - tag: scope
                  value: availability

          trigger_prototypes:
            - uuid: b16504b8163345399e14698e8a21672f
              name: "ROS: BGP session [{#BGP.SESSION}] is not established on {HOST.NAME}"
              expression: "last(/Mikrotik RouterOS by HTTP/ros.bgp.established[{#BGP.SESSION}])=0"
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: "last(/Mikrotik RouterOS by HTTP/ros.bgp.established[{#BGP.SESSION}])=1"
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
                - tag: component
                  value: routing

            - uuid: 7d21793c8d8847a2bfa533f61201e9bf
              name: "ROS: BGP session [{#BGP.SESSION}] prefix count dropped on {HOST.NAME}"
              expression: "change(/Mikrotik RouterOS by HTTP/ros.bgp.prefix.count[{#BGP.SESSION}])<-100"
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: "change(/Mikrotik RouterOS by HTTP/ros.bgp.prefix.count[{#BGP.SESSION}])>=-100"
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
                - tag: component
                  value: routing

        # --- OSPF neighbor discovery ---
        - uuid: b163a2bebe6241d5a051b512ee5ffada
          name: "ROS: OSPF neighbor discovery"
          type: DEPENDENT
          key: "ros.ospf.discovery"
          master_item:
            key: "ros.ospf.neighbors.raw"
          delay: "300"
          lifetime: "7d"
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                    var arr = JSON.parse(value);
                    return JSON.stringify(arr);
                  } catch(e) {
                    return "[]";
                  }
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - "1h"
          lld_macro_paths:
            - lld_macro: "{#OSPF.ROUTER.ID}"
              path: "$['router-id']"
            - lld_macro: "{#OSPF.ADDRESS}"
              path: "$.address"
            - lld_macro: "{#OSPF.INTERFACE}"
              path: "$.interface"
          item_prototypes:
            - uuid: c0299681a1704a9fa9b8d3516eb7489b
              name: "ROS: OSPF [{#OSPF.ROUTER.ID}] state"
              type: DEPENDENT
              key: "ros.ospf.state[{#OSPF.ROUTER.ID}]"
              master_item:
                key: "ros.ospf.neighbors.raw"
              value_type: CHAR
              trends: "0"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - "$[?(@.['router-id']=='{#OSPF.ROUTER.ID}')].state.first()"
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "down"
              tags:
                - tag: component
                  value: routing
                - tag: scope
                  value: availability

            - uuid: 359011f06aef4b0b8c82deb0f98e8c11
              name: "ROS: OSPF [{#OSPF.ROUTER.ID}] state change count"
              type: DEPENDENT
              key: "ros.ospf.state.changes[{#OSPF.ROUTER.ID}]"
              master_item:
                key: "ros.ospf.neighbors.raw"
              value_type: UNSIGNED
              trends: "7d"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - "$[?(@.['router-id']=='{#OSPF.ROUTER.ID}')].state-changes.first()"
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              tags:
                - tag: component
                  value: routing
                - tag: scope
                  value: availability

          trigger_prototypes:
            - uuid: e8c040fec8dc47288d716bb4ec8261b8
              name: "ROS: OSPF neighbor [{#OSPF.ROUTER.ID}] is not Full on {HOST.NAME}"
              expression: |
                last(/Mikrotik RouterOS by HTTP/ros.ospf.state[{#OSPF.ROUTER.ID}])<>"Full"
                and last(/Mikrotik RouterOS by HTTP/ros.ospf.state[{#OSPF.ROUTER.ID}])<>"down"
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                last(/Mikrotik RouterOS by HTTP/ros.ospf.state[{#OSPF.ROUTER.ID}])="Full"
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
                - tag: component
                  value: routing

            - uuid: 9ae72a093ac54274bd1c632e14acd8f1
              name: "ROS: OSPF neighbor [{#OSPF.ROUTER.ID}] went down on {HOST.NAME}"
              expression: |
                last(/Mikrotik RouterOS by HTTP/ros.ospf.state[{#OSPF.ROUTER.ID}])="down"
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                last(/Mikrotik RouterOS by HTTP/ros.ospf.state[{#OSPF.ROUTER.ID}])<>"down"
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
                - tag: component
                  value: routing

            - uuid: e7e1fa2f01964a5caf959a35ba59c55f
              name: "ROS: OSPF neighbor [{#OSPF.ROUTER.ID}] state flapping on {HOST.NAME}"
              expression: "change(/Mikrotik RouterOS by HTTP/ros.ospf.state.changes[{#OSPF.ROUTER.ID}])>0"
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: "change(/Mikrotik RouterOS by HTTP/ros.ospf.state.changes[{#OSPF.ROUTER.ID}])=0"
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
                - tag: component
                  value: routing
